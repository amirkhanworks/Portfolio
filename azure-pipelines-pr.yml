# PR Pipeline for SonarQube Analysis
trigger: none

pr:
  branches:
    include:
      - master
      - develop

pool:
  vmImage: ubuntu-latest

variables:
  buildConfiguration: 'Release'
  sonarProjectKey: 'akash-portfolio'
  sonarProjectName: 'Akash Roy DevOps Portfolio'

steps:
- task: NodeTool@0
  inputs:
    versionSpec: '18.x'
  displayName: 'Install Node.js'

- script: |
    npm ci --legacy-peer-deps
  displayName: 'Install dependencies'

- task: SonarQubePrepare@5
  inputs:
    SonarQube: 'SonarQube-Server'
    scannerMode: 'CLI'
    configMode: 'file'
    cliProjectKey: '$(sonarProjectKey)'
    cliProjectName: '$(sonarProjectName)'
    cliSources: 'src'
    cliLanguage: 'js'
    extraProperties: |
      sonar.pullrequest.key=$(System.PullRequest.PullRequestNumber)
      sonar.pullrequest.branch=$(System.PullRequest.SourceBranch)
      sonar.pullrequest.base=$(System.PullRequest.TargetBranch)
      sonar.javascript.lcov.reportPaths=coverage/lcov.info
      sonar.exclusions=**/node_modules/**,**/build/**,**/coverage/**,**/*.test.js,**/*.spec.js
      sonar.test.exclusions=**/node_modules/**,**/build/**
      sonar.coverage.exclusions=**/node_modules/**,**/build/**,**/*.test.js,**/*.spec.js
  displayName: 'Prepare SonarQube PR analysis'

- script: |
    npm run build:optimized
  displayName: 'Build React app'

- task: SonarQubeAnalyze@5
  displayName: 'Run SonarQube PR analysis'

- task: SonarQubePublish@5
  inputs:
    pollingTimeoutSec: '300'
  displayName: 'Publish SonarQube PR results'
