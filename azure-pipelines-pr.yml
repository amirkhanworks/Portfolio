# PR Pipeline for SonarQube Analysis
trigger: none

pr:
  branches:
    include:
      - master
      - develop

pool:
  vmImage: ubuntu-latest

variables:
  buildConfiguration: 'Release'
  sonarProjectKey: 'roydevops0145_DevOps-Portfolio'
  sonarProjectName: 'DevOps Portfolio'
  sonarOrganization: 'roydevops0145'
  sonarHostUrl: 'https://sonarcloud.io'

steps:
- checkout: self
  fetchDepth: 0
- task: NodeTool@0
  inputs:
    versionSpec: '18.x'
  displayName: 'Install Node.js'

- script: |
    npm ci --legacy-peer-deps
  displayName: 'Install dependencies'

- task: SonarCloudPrepare@3
  inputs:
    SonarCloud: 'SonarQube Cloud'
    organization: '$(sonarOrganization)'
    scannerMode: 'CLI'
    configMode: 'file'
    cliProjectKey: '$(sonarProjectKey)'
    cliProjectName: '$(sonarProjectName)'
    cliSources: 'src'
    extraProperties: |
      sonar.pullrequest.key=$(System.PullRequest.PullRequestNumber)
      sonar.pullrequest.branch=$(System.PullRequest.SourceBranch)
      sonar.pullrequest.base=$(System.PullRequest.TargetBranch)
      sonar.javascript.lcov.reportPaths=coverage/lcov.info
      sonar.exclusions=**/node_modules/**,**/build/**,**/coverage/**,**/*.test.js,**/*.spec.js
      sonar.test.exclusions=**/node_modules/**,**/build/**
      sonar.coverage.exclusions=**/node_modules/**,**/build/**,**/*.test.js,**/*.spec.js
  displayName: 'Prepare SonarCloud PR analysis'

- script: |
    npm run build:optimized
  displayName: 'Build React app'

- task: SonarCloudAnalyze@3
  displayName: 'Run SonarCloud PR analysis'

- task: SonarCloudPublish@3
  inputs:
    pollingTimeoutSec: '300'
    continueOnError: true
  displayName: 'Publish SonarCloud PR results'
