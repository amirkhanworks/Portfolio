trigger:
  branches:
    include:
      - master

pool:
  vmImage: ubuntu-latest

variables:
  buildConfiguration: 'Release'
  reactAppBuildDir: 'build'

steps:
- task: NodeTool@0
  inputs:
    versionSpec: '18.x'
  displayName: 'Install Node.js'

- script: |
    npm ci --legacy-peer-deps
    REACT_APP_ADMIN_PASSWORD="$(ADMIN_PASSWORD)" npm run build:optimized
  displayName: 'Install dependencies & build React app'

- task: CopyFiles@2
  inputs:
    SourceFolder: '$(reactAppBuildDir)'
    Contents: '**'
    TargetFolder: '$(Build.ArtifactStagingDirectory)'
  displayName: 'Copy build output to staging'

- task: ArchiveFiles@2
  inputs:
    rootFolderOrFile: '$(Build.ArtifactStagingDirectory)'
    includeRootFolder: false
    archiveType: 'zip'
    archiveFile: '$(Build.ArtifactStagingDirectory)/build.zip'
    replaceExistingArchive: true
  displayName: 'Archive build folder as build.zip'

- task: PublishBuildArtifacts@1
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)/build.zip'
    ArtifactName: 'react-portfolio'
  displayName: 'Publish build.zip to artifacts'

- task: AzureWebApp@1
  inputs:
    azureSubscription: 'Akash-DevOps-SvC'
    appType: 'webAppLinux'
    appName: 'akash-portfolio'
    package: '$(Build.ArtifactStagingDirectory)/build.zip'
  displayName: 'Deploy to Azure Web App'
