trigger:
  branches:
    include:
      - master
      - feature/*
      - develop

pr:
  branches:
    include:
      - master
      - develop

pool:
  vmImage: ubuntu-latest

variables:
  buildConfiguration: 'Release'
  reactAppBuildDir: 'build'
  sonarProjectKey: 'akash-portfolio'
  sonarProjectName: 'Akash Roy DevOps Portfolio'

stages:
- stage: Build
  displayName: 'Build and Test'
  jobs:
  - job: BuildJob
    displayName: 'Build Application'
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '18.x'
      displayName: 'Install Node.js'

    - script: |
        npm ci --legacy-peer-deps
      displayName: 'Install dependencies'

    - script: |
        npm run test:ci
      displayName: 'Run tests with coverage'

    - task: SonarQubePrepare@5
      inputs:
        SonarQube: 'SonarQube-Server'
        scannerMode: 'CLI'
        configMode: 'file'
        cliProjectKey: '$(sonarProjectKey)'
        cliProjectName: '$(sonarProjectName)'
        cliSources: 'src'
        cliLanguage: 'js'
        extraProperties: |
          sonar.javascript.lcov.reportPaths=coverage/lcov.info
          sonar.exclusions=**/node_modules/**,**/build/**,**/coverage/**,**/*.test.js,**/*.spec.js
          sonar.test.exclusions=**/node_modules/**,**/build/**
          sonar.coverage.exclusions=**/node_modules/**,**/build/**,**/*.test.js,**/*.spec.js
      displayName: 'Prepare SonarQube analysis'

    - script: |
        npm run build:optimized
      displayName: 'Build React app'

    - task: SonarQubeAnalyze@5
      displayName: 'Run SonarQube analysis'

    - task: SonarQubePublish@5
      inputs:
        pollingTimeoutSec: '300'
      displayName: 'Publish SonarQube results'

    - task: CopyFiles@2
      inputs:
        SourceFolder: '$(reactAppBuildDir)'
        Contents: '**'
        TargetFolder: '$(Build.ArtifactStagingDirectory)'
      displayName: 'Copy build output to staging'

    - task: ArchiveFiles@2
      inputs:
        rootFolderOrFile: '$(Build.ArtifactStagingDirectory)'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/build.zip'
        replaceExistingArchive: true
      displayName: 'Archive build folder as build.zip'

    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/build.zip'
        ArtifactName: 'react-portfolio'
      displayName: 'Publish build.zip to artifacts'

- stage: Deploy
  displayName: 'Deploy to Production'
  dependsOn: Build
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/master'))
  jobs:
  - job: DeployJob
    displayName: 'Deploy to Azure Web App'
    steps:
    - task: AzureWebApp@1
      inputs:
        azureSubscription: 'Akash-DevOps-SvC'
        appType: 'webAppLinux'
        appName: 'akash-portfolio'
        package: '$(Pipeline.Workspace)/react-portfolio/build.zip'
      displayName: 'Deploy to Azure Web App'
