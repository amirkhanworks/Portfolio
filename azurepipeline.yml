trigger:
  branches:
    include:
      - master
      - feature/*
      - develop

pr:
  branches:
    include:
      - master
      - develop

pool:
  vmImage: ubuntu-latest

variables:
  buildConfiguration: 'Release'
  reactAppBuildDir: 'build'
  sonarProjectKey: 'roydevops0145_DevOps-Portfolio'  # Exact match with SonarCloud
  sonarProjectName: 'DevOps Portfolio'
  sonarOrganization: 'roydevops0145'
  sonarHostUrl: 'https://sonarcloud.io'

stages:
- stage: Build
  displayName: 'Build and Test'
  jobs:
  - job: BuildJob
    displayName: 'Build Application'
    steps:
    - checkout: self
      fetchDepth: 0
    - task: NodeTool@0
      inputs:
        versionSpec: '18.x'
      displayName: 'Install Node.js'

    - script: |
        npm ci --legacy-peer-deps
      displayName: 'Install dependencies'

    - script: |
        npm run test:ci
      displayName: 'Run tests with coverage'

    - task: SonarCloudPrepare@3
      inputs:
        SonarCloud: 'SonarQube Cloud'
        organization: '$(sonarOrganization)'
        scannerMode: 'CLI'
        configMode: 'file'
        cliProjectKey: '$(sonarProjectKey)'
        cliProjectName: '$(sonarProjectName)'
        cliSources: 'src'
        extraProperties: |
          sonar.javascript.lcov.reportPaths=coverage/lcov.info
          sonar.exclusions=**/node_modules/**,**/build/**,**/coverage/**,**/*.test.js,**/*.spec.js
          sonar.test.exclusions=**/node_modules/**,**/build/**
          sonar.coverage.exclusions=**/node_modules/**,**/build/**,**/*.test.js,**/*.spec.js
      displayName: 'Prepare SonarCloud analysis'

    - script: |
        npm run build:optimized
      displayName: 'Build React app'

    - task: SonarCloudAnalyze@3
      displayName: 'Run SonarCloud analysis'

    - task: SonarCloudPublish@3
      inputs:
        pollingTimeoutSec: '300'
        continueOnError: true
      displayName: 'Publish SonarCloud results'

    - task: CopyFiles@2
      inputs:
        SourceFolder: '$(reactAppBuildDir)'
        Contents: '**'
        TargetFolder: '$(Build.ArtifactStagingDirectory)'
      displayName: 'Copy build output to staging'

    - task: ArchiveFiles@2
      inputs:
        rootFolderOrFile: '$(Build.ArtifactStagingDirectory)'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/build.zip'
        replaceExistingArchive: true
      displayName: 'Archive build folder as build.zip'

    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/build.zip'
        ArtifactName: 'react-portfolio'
      displayName: 'Publish build.zip to artifacts'

- stage: Deploy
  displayName: 'Deploy to Production'
  dependsOn: Build
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/master'))
  jobs:
  - deployment: DeployJob
    displayName: 'Deploy to Azure Web App'
    environment: 'Production'
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: react-portfolio
          - task: AzureWebApp@1
            inputs:
              azureSubscription: 'Akash-DevOps-SvC'
              appType: 'webAppLinux'
              appName: 'akash-portfolio'
              package: '$(Pipeline.Workspace)/react-portfolio/build.zip'
            displayName: 'Deploy to Azure Web App'
