trigger:
  branches:
    include:
      - master

pool:
  vmImage: ubuntu-latest

variables:
  buildConfiguration: 'Release'
  reactAppBuildDir: 'build'

steps:
- task: NodeTool@0
  inputs:
    versionSpec: '18.x'
  displayName: 'Install Node.js'

- script: |
    npm install
    npm run build
  displayName: 'Install & Build React App'

- task: CopyFiles@2
  inputs:
    SourceFolder: '$(reactAppBuildDir)'
    Contents: '**'
    TargetFolder: '$(Build.ArtifactStagingDirectory)/app'
  displayName: 'Copy build files to Artifact Staging'

- task: ArchiveFiles@2
  inputs:
    rootFolderOrFile: '$(Build.ArtifactStagingDirectory)/app'
    includeRootFolder: false
    archiveType: 'zip'
    archiveFile: '$(Build.ArtifactStagingDirectory)/app.zip'
    replaceExistingArchive: true
  displayName: 'Archive App Files'

- task: PublishBuildArtifacts@1
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)/app.zip'
    ArtifactName: 'react-portfolio'
  displayName: 'Publish Artifact'

- task: AzureWebApp@1
  inputs:
    azureSubscription: 'Akash-DevOps-SvC'
    appType: 'webAppLinux'
    appName: 'akash-portfolio'
    package: '$(Build.ArtifactStagingDirectory)/app.zip'
  displayName: 'Deploy to Azure App Service'
