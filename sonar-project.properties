sonar.projectKey=roydevops0145_DevOps-Portfolio
sonar.organization=roydevops0145
# This is the name and version displayed in the SonarCloud UI.
sonar.projectName=DevOps Portfolio
sonar.projectVersion=1.0

# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
sonar.sources=src

# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8

# JavaScript/TypeScript specific configuration
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.exclusions=**/node_modules/**,**/build/**,**/coverage/**,**/public/**,**/*.test.js,**/*.spec.js,**/*.test.jsx,**/*.spec.jsx
sonar.test.exclusions=**/node_modules/**,**/build/**
sonar.coverage.exclusions=**/node_modules/**,**/build/**,**/public/**,**/*.test.js,**/*.spec.js,**/*.test.jsx,**/*.spec.jsx,**/index.js,**/setupTests.js

# Quality gate configuration - Make it more lenient for portfolio
sonar.qualitygate.wait=false

# Security and maintainability - Relaxed for portfolio
sonar.security.hotspots.reviewed=false
sonar.maintainability.rating=false
sonar.reliability.rating=false
sonar.security.rating=false

# Duplication detection - More lenient
sonar.cpd.javascript.minimumtokens=200

# Coverage requirements - Relaxed for portfolio
sonar.coverage.required=false
sonar.coverage.minimum=0
