# SonarQube Configuration for Akash Roy DevOps Portfolio
sonar.projectKey=akash-portfolio
sonar.projectName=Akash Roy DevOps Portfolio
sonar.projectVersion=1.0

# Source code configuration
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.js,**/*.spec.js,**/*.test.jsx,**/*.spec.jsx
sonar.exclusions=**/node_modules/**,**/build/**,**/coverage/**,**/public/**,**/*.test.js,**/*.spec.js,**/*.test.jsx,**/*.spec.jsx

# Language configuration
sonar.sourceEncoding=UTF-8
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Coverage exclusions
sonar.coverage.exclusions=**/node_modules/**,**/build/**,**/public/**,**/*.test.js,**/*.spec.js,**/*.test.jsx,**/*.spec.jsx,**/index.js,**/setupTests.js

# Quality gate configuration
sonar.qualitygate.wait=true

# Security and maintainability
sonar.security.hotspots.reviewed=true
sonar.maintainability.rating=true
sonar.reliability.rating=true
sonar.security.rating=true

# Duplication detection
sonar.cpd.javascript.minimumtokens=100
